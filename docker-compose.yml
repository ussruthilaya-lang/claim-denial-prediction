# Local dev stack. Everything here runs at $0 — no GCP dependency required
# until you deploy the API for real. This is intentional: iterate for free,
# only spend GCP credits when you actually need managed infra (scale, uptime,
# a public URL for a demo).
#
# WHY these three services specifically:
# - mlflow: experiment tracking. Without it, "which model had the best AUROC"
#   becomes a conversation in Slack instead of a queryable fact.
# - postgres: MLflow's backend store (metrics/params need a real DB once more
#   than one person writes to it concurrently — file-based tracking corrupts
#   under concurrent writes).
# - api: the FastAPI serving layer in mlops_platform/serving — loads whichever
#   MLflow-registered model is tagged for the current MODEL_STAGE.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: ./mlops_platform/mlflow
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres:5432/mlflow
      ARTIFACT_ROOT: /mlartifacts
    volumes:
      - mlflow_artifacts:/mlartifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root /mlartifacts
      --host 0.0.0.0 --port 5000

  api:
    build:
      context: .
      dockerfile: mlops_platform/docker/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./phase4_rag_agentic/index:/app/phase4_rag_agentic/index

volumes:
  pg_data:
  mlflow_artifacts:
