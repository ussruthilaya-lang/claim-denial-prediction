name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Each phase tests independently — a broken Phase 3 import (e.g. a
        # missing MIMIC credential env var) should never block Phase 1/2/4
        # from merging. This is the CI equivalent of the package-per-phase
        # structure: isolation at every layer.
        phase: [shared, phase1_baseline, phase2_gbm_shap, phase4_rag_agentic, mlops_platform]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install shared deps
        run: pip install -e ./shared 2>/dev/null || pip install pydantic pydantic-settings scikit-learn numpy mlflow pytest

      - name: Install phase deps
        run: |
          if [ -f "${{ matrix.phase }}/requirements.txt" ]; then
            pip install -r "${{ matrix.phase }}/requirements.txt"
          fi
          pip install pytest

      - name: Run tests
        run: |
          if [ -d "${{ matrix.phase }}/tests" ]; then
            pytest "${{ matrix.phase }}/tests" -v
          else
            echo "No tests dir for ${{ matrix.phase }} yet — skipping"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check . --output-format=github
